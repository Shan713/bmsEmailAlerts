name: BMS Booking Checker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Remove existing Chrome
        run: |
          sudo apt-get remove -y google-chrome-stable || true

      - name: Install Chrome 114
        run: |
          wget https://dl.google.com/linux/chrome/deb/pool/main/g/google-chrome-stable/google-chrome-stable_114.0.5735.90-1_amd64.deb
          sudo dpkg -i google-chrome-stable_114.0.5735.90-1_amd64.deb || sudo apt-get install -f -y
          google-chrome --version

      - name: Install ChromeDriver 114
        run: |
          CHROME_VERSION=114.0.5735.90
          sudo rm -f /usr/local/bin/chromedriver
          wget -N "https://chromedriver.storage.googleapis.com/LATEST_RELEASE_114.0.5735"
          CHROMEDRIVER_VERSION=$(cat LATEST_RELEASE_114.0.5735)
          wget -N "https://chromedriver.storage.googleapis.com/${CHROMEDRIVER_VERSION}/chromedriver_linux64.zip"
          unzip -o chromedriver_linux64.zip
          sudo mv -f chromedriver /usr/local/bin/chromedriver
          sudo chmod +x /usr/local/bin/chromedriver
          chromedriver --version

      - name: Run monitor script
        env:
          BMS_URL: ${{ secrets.BMS_URL }}
          MOVIE_NAME: ${{ secrets.MOVIE_NAME }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python monitor.py
